industry: chemical
industry_name: Overseas chemicals industry
industry_name_zh: Overseas chemicals industry
brand: ChemBiz Daily | Overseas Chemicals Business Brief
logo_preferred: outputs/brand/chembiz-daily-square-logo.png
candidate_count: 20
final_count: 8
regions:
  - United States
  - Canada
  - United Kingdom
  - Major EU markets
  - Japan
  - South Korea
  - Singapore
  - Major Southeast Asian markets
sources:
  - ICIS
  - Chemical Week
  - C&EN
  - Chemical Engineering
  - European Chemical News
  - PR Newswire Chemicals
  - Business Wire Chemicals
  - Company announcements
source_tiers:
  tier_1:
    - ICIS
    - Chemical Week
    - C&EN
    - Chemical Engineering
  tier_2:
    - PR Newswire Chemicals
    - Business Wire Chemicals
    - Company announcements
    - Trade association releases
  tier_3:
    - Reuters
    - Bloomberg
    - Market research summaries
include_topics:
  - pricing
  - supply and demand
  - capacity expansion
  - plant shutdowns and restarts
  - M&A
  - policy and regulation
  - feedstock and energy costs
  - specialty chemicals
exclude_topics:
  - stock-only news
  - generic macro commentary
  - product marketing with no industry impact
  - unsupported market-size claims
writing_style:
  - factual
  - concise
  - supply-chain focused
  - data-aware
scoring:
  scale: 0-5
  weights:
    freshness: 1.4
    industry_impact: 1.5
    business_value: 1.5
    regional_relevance: 1.2
    novelty: 0.9
    actionability: 1.3
    source_quality: 1.3
  priority_rules:
    - Prioritize pricing, supply-demand shifts, capacity, policy, and major producers.
    - Downgrade generic stock-market coverage.
dedupe_keys:
  - company
  - chemical_product
  - facility
  - market_region
  - date_window
poster:
  size: 1080x1350
  scale: 2
  cover_title_max_chars: 56
  quick_read_max_chars: 36
  card_title_max_chars: 42
  output_pattern: outputs/chemical/{brand_slug}-poster-{date}@2x.png
  avoid_line_break_terms:
    - supply and demand
    - capacity expansion
    - feedstock
    - specialty chemicals
memory_rules:
  memory_path: outputs/chemical/memory.md
  output_dir: outputs/chemical
  remember:
    - selected_story_ids
    - price_trend_themes
    - supply_demand_notes
    - final_source_links
  avoid:
    - raw_search_logs
    - unsupported_market_size_claims
