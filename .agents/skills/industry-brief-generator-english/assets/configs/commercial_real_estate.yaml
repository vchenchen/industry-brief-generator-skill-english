industry: commercial_real_estate
industry_name: Overseas commercial real estate industry
industry_name_zh: Overseas commercial real estate industry
brand: CREBiz Daily | Overseas Commercial Real Estate Brief
logo_preferred: outputs/brand/crebiz-daily-square-logo.png
candidate_count: 20
final_count: 8
regions:
  - United States
  - Canada
  - United Kingdom
  - Major EU markets
  - Australia
  - New Zealand
  - Japan
  - South Korea
  - Singapore
  - Major Middle East capital markets
sources:
  - CoStar News
  - Bisnow
  - The Real Deal
  - Commercial Observer
  - GlobeSt
  - PERE
  - IPE Real Assets
  - Green Street
  - MSCI Real Assets
source_tiers:
  tier_1:
    - CoStar News
    - Bisnow
    - The Real Deal
    - Commercial Observer
    - GlobeSt
    - PERE
    - IPE Real Assets
  tier_2:
    - Green Street
    - MSCI Real Assets
    - Company announcements
    - REIT filings
    - PR Newswire Real Estate
  tier_3:
    - Reuters Real Estate
    - Bloomberg Real Estate
    - Market research summaries
include_topics:
  - capital markets
  - asset transactions
  - portfolio sales
  - REIT earnings and asset sales
  - office, retail, logistics, multifamily, and hospitality assets
  - leasing demand and vacancy
  - debt maturity and refinancing
  - distressed assets
  - data centers and life science campuses
exclude_topics:
  - residential buyer guides
  - home improvement content
  - broker marketing
  - single-project promotional copy
  - stock-only news
writing_style:
  - professional
  - restrained
  - asset-focused
  - capital-structure aware
scoring:
  scale: 0-5
  weights:
    freshness: 1.3
    industry_impact: 1.5
    business_value: 1.5
    regional_relevance: 1.2
    novelty: 0.9
    actionability: 1.2
    source_quality: 1.3
  priority_rules:
    - Prioritize debt pressure, asset trades, leasing metrics, and REIT actions.
    - Downgrade single-property marketing.
dedupe_keys:
  - owner
  - asset
  - tenant
  - market_region
  - transaction
  - date_window
poster:
  size: 1080x1350
  scale: 2
  cover_title_max_chars: 56
  quick_read_max_chars: 36
  card_title_max_chars: 42
  output_pattern: outputs/commercial_real_estate/{brand_slug}-poster-{date}@2x.png
  avoid_line_break_terms:
    - commercial real estate
    - capital markets
    - distressed assets
    - data centers
    - refinancing
memory_rules:
  memory_path: outputs/commercial_real_estate/memory.md
  output_dir: outputs/commercial_real_estate
  remember:
    - selected_story_ids
    - final_source_links
    - capital_market_themes
  avoid:
    - raw_search_logs
    - broker_marketing_content
