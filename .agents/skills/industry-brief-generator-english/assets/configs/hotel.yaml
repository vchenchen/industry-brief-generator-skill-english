industry: hotel
industry_name: Overseas hotel industry
industry_name_zh: Overseas hotel industry
brand: HotelBiz Daily | Overseas Hotel Business Brief
logo_preferred: outputs/brand/hotelbiz-daily-square-logo.png
candidate_count: 20
final_count: 8
regions:
  - United States
  - Canada
  - United Kingdom
  - Major EU markets
  - Australia
  - New Zealand
  - Japan
  - South Korea
  - Singapore
  - Major Southeast Asian markets
sources:
  - Skift
  - Hotel Dive
  - Hospitality Net
  - Hotel News Now
  - Lodging Magazine
  - Hotel Management
  - STR
  - HVS
source_tiers:
  tier_1:
    - Skift
    - Hotel Dive
    - Hospitality Net
    - Hotel News Now
    - STR
    - HVS
  tier_2:
    - Lodging Magazine
    - Hotel Management
    - Company announcements
    - PR Newswire Travel
    - Business Wire Travel
  tier_3:
    - Reuters Travel
    - Bloomberg Travel
    - Market research summaries
include_topics:
  - hotel development
  - openings and brand expansion
  - management contracts
  - transactions and investment
  - revenue management
  - occupancy and RevPAR
  - loyalty programs
  - hotel technology
exclude_topics:
  - travel tips
  - destination lifestyle content
  - single-property promotional copy
  - stock-only news
writing_style:
  - professional
  - data-aware
  - concise
  - operator-focused
scoring:
  scale: 0-5
  weights:
    freshness: 1.3
    industry_impact: 1.4
    business_value: 1.5
    regional_relevance: 1.2
    novelty: 1.0
    actionability: 1.2
    source_quality: 1.2
  priority_rules:
    - Prioritize brand expansion, transactions, operating metrics, and technology adoption.
    - Downgrade tourism lifestyle content.
dedupe_keys:
  - company
  - brand
  - property
  - market_region
  - transaction
  - date_window
poster:
  size: 1080x1350
  scale: 2
  cover_title_max_chars: 56
  quick_read_max_chars: 36
  card_title_max_chars: 42
  output_pattern: outputs/hotel/{brand_slug}-poster-{date}@2x.png
  avoid_line_break_terms:
    - revenue management
    - management contract
    - hotel technology
    - brand expansion
memory_rules:
  memory_path: outputs/hotel/memory.md
  output_dir: outputs/hotel
  remember:
    - selected_story_ids
    - final_source_links
    - operating_metric_themes
  avoid:
    - raw_search_logs
    - travel_lifestyle_content
