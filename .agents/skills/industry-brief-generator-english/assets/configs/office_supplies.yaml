industry: office_supplies
industry_name: Overseas office supplies industry
industry_name_zh: Overseas office supplies industry
brand: OfficeBiz Daily | Overseas Office Supplies Business Brief
logo_preferred: outputs/brand/officebiz-daily-square-logo.png
candidate_count: 20
final_count: 8
regions:
  - United States
  - Canada
  - United Kingdom
  - Major EU markets
  - Australia
  - New Zealand
  - Japan
  - South Korea
  - Singapore
  - Major Southeast Asian markets
sources:
  - OPI
  - Workplace360
  - Independent Dealer
  - Business of Furniture
  - Furniture Today
  - Stationery Trends
  - Retail Dive
  - Modern Retail
  - Digital Commerce 360
  - Supply Chain Dive
source_tiers:
  tier_1:
    - OPI
    - Workplace360
    - Independent Dealer
    - Business of Furniture
    - Furniture Today
    - Stationery Trends
  tier_2:
    - Retail Dive
    - Modern Retail
    - Digital Commerce 360
    - Supply Chain Dive
    - Company announcements
    - PR Newswire Retail
    - Business Wire Retail
  tier_3:
    - Reuters Retail
    - Bloomberg Retail
    - Market research summaries
include_topics:
  - office supplies retail
  - B2B distribution
  - office furniture and ergonomics
  - stationery, paper, and print supplies
  - ecommerce and procurement systems
  - M&A and channel consolidation
  - supply chain and pricing
  - sustainable office products
  - smart office devices
  - government and education procurement
exclude_topics:
  - generic productivity tips
  - stationery influencer content
  - single-product promotional copy
  - unrelated consumer electronics
  - stock-only news
  - product news with no channel, pricing, supply chain, or industry impact
writing_style:
  - professional
  - concise
  - channel-aware
  - B2B procurement focused
scoring:
  scale: 0-5
  weights:
    freshness: 1.3
    industry_impact: 1.4
    business_value: 1.5
    regional_relevance: 1.2
    novelty: 0.9
    actionability: 1.2
    source_quality: 1.2
  priority_rules:
    - Prioritize B2B distribution, procurement, omnichannel retail, office furniture, and supply chain changes.
    - Downgrade influencer stationery content and promotional copy.
dedupe_keys:
  - company
  - brand
  - product_category
  - channel
  - transaction
  - market_region
  - date_window
poster:
  size: 1080x1350
  scale: 2
  cover_title_max_chars: 56
  quick_read_max_chars: 36
  card_title_max_chars: 42
  output_pattern: outputs/office_supplies/{brand_slug}-poster-{date}@2x.png
  avoid_line_break_terms:
    - office supplies
    - office furniture
    - enterprise procurement
    - B2B distribution
    - hybrid work
    - print supplies
    - supply chain
memory_rules:
  memory_path: outputs/office_supplies/memory.md
  output_dir: outputs/office_supplies
  remember:
    - selected_story_ids
    - final_source_links
    - channel_trend_themes
    - procurement_trend_themes
  avoid:
    - raw_search_logs
    - influencer_stationery_content
    - unsupported_market_size_claims
