industry: pet
industry_name: Overseas pet industry
industry_name_zh: Overseas pet industry
brand: PetBiz Daily | Overseas Pet Business Brief
logo_preferred: outputs/brand/petbiz-daily-square-logo.png
candidate_count: 20
final_count: 8
regions:
  - United States
  - Canada
  - United Kingdom
  - Major EU markets
  - Australia
  - New Zealand
  - Japan
  - South Korea
  - Singapore
sources:
  - Petfood Industry
  - GlobalPETS
  - Pet Business
  - Pet Product News
  - Petfood Processing
  - Veterinary Practice News
  - Today's Veterinary Business
source_tiers:
  tier_1:
    - Petfood Industry
    - GlobalPETS
    - Pet Business
    - Pet Product News
  tier_2:
    - Petfood Processing
    - Veterinary Practice News
    - Today's Veterinary Business
    - PR Newswire Pet
    - Business Wire Pet
  tier_3:
    - Company announcements
    - Market research summaries
    - Retail trade media
include_topics:
  - pet food and nutrition
  - pet retail and ecommerce
  - veterinary services
  - pet insurance
  - smart pet hardware
  - pet services and chains
  - M&A and funding
  - safety and recalls
exclude_topics:
  - cute pet stories
  - owner tips from social media
  - rescue stories with no business relevance
  - generic consumer health
writing_style:
  - professional
  - consumer-market aware
  - concise
  - card-like
scoring:
  scale: 0-5
  weights:
    freshness: 1.3
    industry_impact: 1.4
    business_value: 1.4
    regional_relevance: 1.2
    novelty: 1.0
    actionability: 1.2
    source_quality: 1.2
  priority_rules:
    - Prioritize retail, veterinary, insurance, food, and channel shifts.
    - Downgrade lifestyle-only pet content.
dedupe_keys:
  - company
  - brand
  - product_category
  - market_region
  - date_window
poster:
  size: 1080x1350
  scale: 2
  cover_title_max_chars: 56
  quick_read_max_chars: 36
  card_title_max_chars: 42
  output_pattern: outputs/pet/{brand_slug}-poster-{date}@2x.png
  avoid_line_break_terms:
    - pet insurance
    - veterinary services
    - pet food
    - smart pet hardware
memory_rules:
  memory_path: outputs/pet/memory.md
  output_dir: outputs/pet
  remember:
    - selected_story_ids
    - final_source_links
    - retail_trend_themes
  avoid:
    - raw_search_logs
    - cute_pet_content
